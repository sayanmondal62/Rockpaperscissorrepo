<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="choises">
        <div class="choise" id="rock">
            <img src="/Rock-Paper-ScissorGame/rock.png">
        </div>
        <div class="choise" id="paper">
            <img src="/Rock-Paper-ScissorGame/paper.png">
        </div>
        <div class="choise" id="scissors">
            <img src="/Rock-Paper-ScissorGame/scissors.png">
        </div>
    </div>

    <div class="score-board">
        <div class="Score">
            <p id="User-score">0</p>
            <p>You</p>
        </div>
        <div class="Score">
            <p id="Comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">play your move</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
